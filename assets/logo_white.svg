<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Delta Map and Drone — Agricultural Drone Mapping">
  <title>Delta Map and Drone</title>
  <desc>White variant for dark backgrounds. Triangular delta with contour topography lines, drone mark in the upper third, stacked all-caps serif wordmark with tagline.</desc>

  <defs>
    <clipPath id="deltaClipWhite">
      <polygon points="80,0 160,138 0,138"/>
    </clipPath>
  </defs>

  <g transform="translate(115, 80)">
    <g clip-path="url(#deltaClipWhite)">
      <path d="M -20,28 Q 30,16 80,26 Q 130,36 180,24" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
      <path d="M -20,50 Q 30,40 80,48 Q 130,56 180,44" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
      <path d="M -20,72 Q 30,62 80,68 Q 130,76 180,64" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
      <path d="M -20,94 Q 30,86 80,90 Q 130,96 180,86" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
      <path d="M -20,116 Q 30,110 80,112 Q 130,116 180,108" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
    </g>

    <polygon points="80,0 160,138 0,138" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>

    <line x1="68" y1="58" x2="92" y2="58" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="68" cy="58" r="3" fill="#FFFFFF"/>
    <circle cx="92" cy="58" r="3" fill="#FFFFFF"/>
    <rect x="76" y="54" width="8" height="8" rx="1.5" fill="#FFFFFF"/>
  </g>

  <g transform="translate(310, 130)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#FFFFFF" letter-spacing="3">DELTA MAP</text>
    <text x="0" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#FFFFFF" letter-spacing="3">AND DRONE</text>
    <line x1="0" y1="64" x2="305" y2="64" stroke="#FFFFFF" stroke-width="1"/>
    <text x="0" y="86" font-family="Georgia, serif" font-size="11" font-weight="400" fill="#FFFFFF" letter-spacing="5" font-style="italic">AGRICULTURAL DRONE MAPPING</text>
  </g>
</svg>
